services:
  music-machine:
    build: .
    container_name: music-machine
    ports:
      - "8686:8686"
    volumes:
      - ./data:/data
      - /mnt/music:/music
      - /mnt/music-trash:/trash
      - ./staging:/staging
    environment:
      - MUSIC_PATH=/music
      - MUSIC_ROOT=/music
      - TRASH_PATH=/trash
      - STAGING_PATH=/staging
      - DB_PATH=/data/music-machine.db
      - MUSICGRABBER_URL=http://10.0.0.75:38274
      - PLEX_URL=${PLEX_URL:-http://10.0.0.13:32400}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - AUDD_API_KEY=0b109e9c1fef8b670abdd86dd24d3c7d
      - MB_DB_URI=postgresql://musicbrainz:musicbrainz@musicbrainz-db:5432/musicbrainz
    restart: unless-stopped
    depends_on:
      musicbrainz-db:
        condition: service_started

  sonic-analyzer:
    build:
      context: ./sonic-analyzer
    container_name: sonic-analyzer
    volumes:
      - ./data:/data
      - /mnt/music:/music:ro
      - essentia-models:/models
    environment:
      - DB_PATH=/data/music-machine.db
      - MUSIC_PATH=/music
      - MODELS_DIR=/models
    restart: unless-stopped
    depends_on:
      - music-machine

  musicbrainz-db:
    image: postgres:16-alpine
    container_name: musicbrainz-db
    volumes:
      - musicbrainz-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=musicbrainz
      - POSTGRES_USER=musicbrainz
      - POSTGRES_PASSWORD=musicbrainz
    restart: unless-stopped
    shm_size: 256mb

volumes:
  essentia-models:
  musicbrainz-data:
