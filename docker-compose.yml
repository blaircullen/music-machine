services:
  music-machine:
    build: .
    container_name: music-machine
    ports:
      - "8686:8686"
    volumes:
      - ./data:/data
      - /mnt/music:/music
      - /mnt/music-trash:/trash
      - ./staging:/staging
    environment:
      - MUSIC_PATH=/music
      - MUSIC_ROOT=/music
      - TRASH_PATH=/trash
      - STAGING_PATH=/staging
      - DB_PATH=/data/music-machine.db
      - MUSICGRABBER_URL=http://10.0.0.75:38274
    restart: unless-stopped
